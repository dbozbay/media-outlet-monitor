name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - services/pipeline/extract
          - services/pipeline/enrich
          - services/pipeline/load
          - services/api
          - services/dashboard

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Run tests
        run: cd ${{ matrix.service }} && uv run pytest --cov

      - name: Lint with Ruff
        run: cd ${{ matrix.service }} && uv run ruff check .